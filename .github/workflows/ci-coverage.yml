name: Siteops Coverage (Codecov)

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - uses: actions/upload-artifact@v4
        with:
          name: siteops-coverage
          path: coverage.out
      - uses: codecov/codecov-action@4bfa2a3e6e6e3e1e0e2e3e4e5e6e7e8e9e0e1e2e3
        with:
          files: coverage.out
          fail_ci_if_error: false
