name: Security (govulncheck)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
